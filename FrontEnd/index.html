<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BodyLog</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <link rel="stylesheet" href="style.css">


</head>
<body>

<header>
  <div class="logo">Body<span>Log</span></div>
  <nav class="section-tabs">
    <button class="section-tab active" data-section="body" onclick="switchSection('body')">
      <span class="tab-icon">◎</span> Body
    </button>
    <button class="section-tab" data-section="finances" onclick="switchSection('finances')">
      <span class="tab-icon">◈</span> Finances
    </button>
    <button class="section-tab" data-section="exercises" onclick="switchSection('exercises')">
      <span class="tab-icon">◇</span> Exercises
    </button>
  </nav>
</header>

<main>
  <section class="section active" id="section-body"></section>
  <section class="section"        id="section-finances"></section>
  <section class="section"        id="section-exercises"></section>
</main>

<div id="modal-container"></div>
<div id="modal-container-ex"></div>

<div class="success-toast" id="toast">✓ Check-in salvo com sucesso!</div>
<div class="success-toast" id="toast-erro" style="background:var(--danger);color:#fff">✗ Erro ao salvar. Veja o console.</div>

<nav class="mobile-nav">
  <button class="mobile-nav-tab active" data-section="body" onclick="switchSection('body')">
    <span class="mobile-nav-icon">◎</span>
    <span class="mobile-nav-label">Body</span>
  </button>
  <button class="mobile-nav-tab" data-section="finances" onclick="switchSection('finances')">
    <span class="mobile-nav-icon">◈</span>
    <span class="mobile-nav-label">Finances</span>
  </button>
  <button class="mobile-nav-tab" data-section="exercises" onclick="switchSection('exercises')">
    <span class="mobile-nav-icon">◇</span>
    <span class="mobile-nav-label">Exercises</span>
  </button>
</nav>

<script src="js/api.js"></script>
<script src="js/checkin.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/exercicios.js"></script>
<script src="js/app.js"></script>

</body>
</html>
