<div id="dash-empty" class="empty-state" style="display:none;">
  <h3>Nenhum dado ainda</h3>
  <p>Vá para <strong>Registrar</strong> e adicione seu primeiro check-in!</p>
</div>

<div id="dash-content">
  <div class="dash-header">
    <h1>Seu Dashboard</h1>
    <span class="last-update" id="last-update-label"></span>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card" style="--kpi-color: var(--accent)">
      <div class="kpi-label">Peso atual</div>
      <div class="kpi-value" id="kpi-peso">—<span class="kpi-unit">kg</span></div>
      <div class="kpi-delta" id="kpi-peso-delta"></div>
    </div>
    <div class="kpi-card" style="--kpi-color: var(--accent2)">
      <div class="kpi-label">% Gordura</div>
      <div class="kpi-value" id="kpi-gordura">—<span class="kpi-unit">%</span></div>
      <div class="kpi-delta" id="kpi-gordura-delta"></div>
    </div>
    <div class="kpi-card" style="--kpi-color: #f5d742">
      <div class="kpi-label">Massa Muscular</div>
      <div class="kpi-value" id="kpi-musculo">—<span class="kpi-unit">kg</span></div>
      <div class="kpi-delta" id="kpi-musculo-delta"></div>
    </div>
    <div class="kpi-card" style="--kpi-color: var(--accent3)">
      <div class="kpi-label">FFMI</div>
      <div class="kpi-value" id="kpi-ffmi">—</div>
      <div class="kpi-delta" id="kpi-ffmi-delta"></div>
    </div>
  </div>

  <!-- Gráficos fixos -->
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Evolução do Peso (kg)</div>
      <canvas id="chart-peso" height="120"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Composição Corporal</div>
      <canvas id="chart-composicao" height="120"></canvas>
    </div>
  </div>

  <!-- Gráfico dinâmico por métrica -->
  <div class="chart-card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px">
      <div class="chart-title" style="margin:0;white-space:nowrap">Evolução por Métrica</div>
      <select id="metric-selector" onchange="onMetricChange()" style="
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 12px;
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 0.75rem;
        cursor: pointer;
        outline: none;
        max-width: 280px;
        width: 100%;
      "></select>
    </div>
    <canvas id="chart-metrica" height="100"></canvas>
  </div>

  <!-- Cards de medidas -->
  <div class="measures-grid" id="measures-grid"></div>

  <!-- Tabela histórico -->
  <div class="history-card">
    <div class="chart-title" style="margin-bottom:20px">Histórico de Check-ins</div>
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Peso</th>
          <th>Gordura</th>
          <th>Massa Muscular</th>
          <th>Cintura</th>
          <th>Abdominal</th>
          <th>Sono</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>
</div>
