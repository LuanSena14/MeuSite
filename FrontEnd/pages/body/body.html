<div id="dash-feedback" class="section-feedback section-feedback-inline is-hidden"></div>

<div id="dash-empty" class="empty-state dash-empty">
  <div class="empty-icon">◎</div>
  <h3>Nenhum dado ainda</h3>
  <p>Adicione seu primeiro check-in para começar a acompanhar sua evolução.</p>
  <button class="btn-add empty-cta" onclick="openModal()">+ Adicionar dados</button>
</div>

<div id="dash-content">
  <div class="kpi-grid">
    <div class="kpi-card kpi-color-accent">
      <div class="kpi-label">Peso atual</div>
      <div class="kpi-value" id="kpi-peso">—<span class="kpi-unit">kg</span></div>
      <div class="kpi-delta" id="kpi-peso-delta"></div>
    </div>
    <div class="kpi-card kpi-color-accent2">
      <div class="kpi-label">% Gordura</div>
      <div class="kpi-value" id="kpi-gordura">—<span class="kpi-unit">%</span></div>
      <div class="kpi-delta" id="kpi-gordura-delta"></div>
    </div>
    <div class="kpi-card kpi-color-gold">
      <div class="kpi-label">Massa Muscular</div>
      <div class="kpi-value" id="kpi-musculo">—<span class="kpi-unit">kg</span></div>
      <div class="kpi-delta" id="kpi-musculo-delta"></div>
    </div>
    <div class="kpi-card kpi-color-accent3">
      <div class="kpi-label">FFMI</div>
      <div class="kpi-value" id="kpi-ffmi">—</div>
      <div class="kpi-delta" id="kpi-ffmi-delta"></div>
    </div>
  </div>
 <div class="chart-card card-gap">
    <div class="body-metric-header">
      <div class="chart-title body-metric-title">Evolução por Métrica</div>
      <select id="metric-selector" class="body-metric-select" onchange="onMetricChange()"></select>
    </div>
    <canvas id="chart-metrica" height="100"></canvas>
  </div>
  
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Evolução do Peso (kg)</div>
      <canvas id="chart-peso" height="120"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Composição Corporal</div>
      <canvas id="chart-composicao" height="120"></canvas>
    </div>
  </div>

  <div class="measures-grid" id="measures-grid"></div>

  <div class="history-card">
    <div class="chart-title body-history-title">Histórico de Check-ins</div>
    <div class="history-table-scroll">
      <table>
        <thead>
          <tr>
            <th>Data</th><th>Peso</th><th>Gordura</th>
            <th>Massa Musc.</th><th>Cintura</th><th>Abdominal</th><th>Sono</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</div>
