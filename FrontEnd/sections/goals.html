<div id="goals-empty" class="goals-state" style="display:none">
  <div class="empty-icon">◑</div>
  <h3>Nenhum dado ainda</h3>
  <p>Adicione seu primeiro registro da suas metas.</p>
</div>

<div id="goals-content">
  <div class="kpi-grid">
    <div class="kpi-card" style="--kpi-color: var(--accent)">
      <div class="kpi-label">Média de goals</div>
      <div class="kpi-value" id="goals-kpi-media">—<span class="kpi-unit">pts</span></div>
    </div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Histórico de goals</div>
    <canvas id="goals-chart-horas" height="120"></canvas>
  </div>
</div>
